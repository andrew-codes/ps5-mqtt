services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
