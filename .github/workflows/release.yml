---
name: Release

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Version part to increment"
        required: true
        type: choice
        default: PATCH
        options:
          - MAJOR
          - MINOR
          - PATCH
      releaseNotes:
        description: "Release notes for this version"
        required: true
        type: string

jobs:
  version:
    name: 🔖 Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 🔖 Bump package.json & add-on version
        id: bump
        run: yarn bump-version ${{ inputs.releaseType }}

      - name: 🙌 Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: >-
            🎉 Release version ${{ steps.bump.outputs.version }} [skip ci]
          file_pattern: package.json add-ons/ps5-mqtt/config.yaml

  static-analysis:
    name: ✅ Static Analysis
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 🎨 Check formatting
        run: yarn format/check

      - name: 🔍 Run typecheck
        run: yarn typecheck

      - name: 🧹 Run lint
        run: yarn lint

  test:
    name: 🧪 Test
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 🧪 Run tests
        run: yarn test

  build:
    name: 🏭 Build & Publish add-on ${{ matrix.arch }}
    needs:
      - version
      - static-analysis
      - test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ["aarch64", "amd64", "armhf", "armv7", "i386"]
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 👨‍🏭 Build App
        run: yarn build

      - name: ⏭ Copy App Files
        run: |
          rsync -a --exclude='.git' --exclude='add-ons' ./ add-ons/ps5-mqtt/
          cp add-ons/common/Dockerfile add-ons/ps5-mqtt
          cp add-ons/common/build.yaml add-ons/ps5-mqtt
          cp add-ons/common/.dockerignore add-ons/ps5-mqtt

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏭 Build & Publish add-on ps5-mqtt-${{ matrix.arch }}
        uses: home-assistant/builder@master
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target /data/add-ons/ps5-mqtt \
            --version ${{ needs.version.outputs.version }} \
            --additional-tag latest \
            --image "ps5-mqtt/${{ matrix.arch }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon

  release:
    name: 🚀 Create GitHub release
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: ✍ Update changelog
        env:
          RELEASE_NOTES: ${{ inputs.releaseNotes }}
        run: yarn update-changelog ${{ needs.version.outputs.version }}

      - name: 🙌 Commit updated changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: >-
            ✍ Update changelog for version ${{ needs.version.outputs.version }} [skip ci]
          file_pattern: add-ons/ps5-mqtt/CHANGELOG.md

      - name: 🚀 Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ inputs.releaseNotes }}
          target_commitish: main
