---
name: Release

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Version part to increment"
        required: true
        type: choice
        default: PATCH
        options:
          - MAJOR
          - MINOR
          - PATCH
      releaseNotes:
        description: "Release notes for this version"
        required: true
        type: string

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: ps5-mqtt-home-assistant-add-on
  BUILD_IMAGE_NAME: ps5-mqtt-home-assistant-add-on-build

jobs:
  version:
    name: 🔖 Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 🔖 Bump package.json & add-on version
        id: bump
        run: yarn bump-version ${{ inputs.releaseType }}

      - name: ⏭ Sync add-on docs
        run: |
          cp README.md add-ons/ps5-mqtt/README.md
          cp docs/DOCS.md add-ons/ps5-mqtt/DOCS.md

      - name: 🙌 Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: >-
            🎉 Release version ${{ steps.bump.outputs.version }} [skip ci]
          file_pattern: package.json add-ons/ps5-mqtt/config.yaml add-ons/ps5-mqtt/README.md add-ons/ps5-mqtt/DOCS.md

  static-analysis:
    name: ✅ Static Analysis
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 🎨 Check formatting
        run: yarn format/check

      - name: 🔍 Run typecheck
        run: yarn typecheck

      - name: 🧹 Run lint
        run: yarn lint

  test:
    name: 🧪 Test
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 🧪 Run tests
        run: yarn run test/unit

  init:
    name: 🧮 Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - name: 🧮 Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.BUILD_IMAGE_NAME }}

  build:
    name: 🏭 Build & Publish add-on ${{ matrix.arch }}
    needs:
      - version
      - static-analysis
      - test
      - init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 👨‍🏭 Build App
        run: yarn build

      - name: 📦 Package App
        env:
          PREPARE_ONLY: "1"
          SKIP_BUILD: "1"
        run: yarn workspace @andrew-codes/ps5-mqtt-server package

      - name: ⏭ Copy App Files
        run: |
          rsync -a --exclude='.git' --exclude='add-ons' ./ add-ons/ps5-mqtt/
          cp add-ons/common/Dockerfile add-ons/ps5-mqtt
          cp add-ons/common/build.yaml add-ons/ps5-mqtt
          cp add-ons/common/.dockerignore add-ons/ps5-mqtt
          cp add-ons/common/run.sh add-ons/ps5-mqtt

      - name: 🏭 Build & Publish add-on ps5-mqtt-${{ matrix.arch }}
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./add-ons/ps5-mqtt
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.21
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.version.outputs.version }}
            latest
          version: ${{ needs.version.outputs.version }}
          push: "true"

  manifest:
    name: 📦 Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: 📦 Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.BUILD_IMAGE_NAME }}
          image-tags: |
            ${{ needs.version.outputs.version }}
            latest

      - name: 🏷️ Promote multi-arch manifest
        env:
          REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}
        run: |
          tags=("${{ needs.version.outputs.version }}" "latest")

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("--tag" "${REGISTRY_PREFIX}/${IMAGE_NAME}:${tag}")
          done

          metadata_file="$(mktemp)"

          docker buildx imagetools create \
            --metadata-file "${metadata_file}" \
            "${tag_args[@]}" \
            "${REGISTRY_PREFIX}/${BUILD_IMAGE_NAME}:${tags[0]}"

          digest="$(jq -r '.["containerimage.descriptor"].digest' "${metadata_file}")"
          cosign sign --yes "${REGISTRY_PREFIX}/${IMAGE_NAME}@${digest}"

  standalone:
    name: 🐳 Build & Publish standalone image
    needs:
      - version
      - static-analysis
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: 👨‍🏭 Build App
        run: yarn build

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Build & publish standalone image
        env:
          REGISTRY: ghcr.io
          OWNER: ${{ github.repository_owner }}
          IMAGE: ps5-mqtt
          TAGS: "${{ needs.version.outputs.version }} latest"
          PLATFORMS: linux/amd64,linux/arm64
          SKIP_BUILD: "1"
        run: yarn workspace @andrew-codes/ps5-mqtt-server publish

  release:
    name: 🚀 Create GitHub release
    needs:
      - version
      - build
      - manifest
      - standalone
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v3
        with:
          ref: main

      - uses: actions/setup-node@v3
        with:
          node-version: 24.16.0

      - name: 🧶 Enable Corepack
        run: corepack enable

      - name: ⏬ Install dependencies
        run: yarn install --immutable

      - name: ✍ Update changelog
        env:
          RELEASE_NOTES: ${{ inputs.releaseNotes }}
        run: yarn update-changelog ${{ needs.version.outputs.version }}

      - name: 🙌 Commit updated changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: >-
            ✍ Update changelog for version ${{ needs.version.outputs.version }} [skip ci]
          file_pattern: add-ons/ps5-mqtt/CHANGELOG.md

      - name: 🚀 Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ inputs.releaseNotes }}
          target_commitish: main
